# openenv.yaml
# This file is read by `openenv validate` and `openenv push`
# It must be in the ROOT of your project

name: self-healing-rag
version: "1.1.0"
description: >
  A self-healing RAG environment where AI agents detect hallucinations
  caused by stale internal documents, identify the exact misleading
  source, archive outdated revisions, and verify the corrected answer.
  Task instances hide ground-truth labels and randomize document IDs.

author: Pradeep K
tags:
  - rag
  - hallucination-detection
  - self-healing
  - knowledge-base
  - enterprise-ai
  - openenv

tasks:
  - name: task_detect_hallucination
    description: Detect when retrieved evidence contains stale conflicting documents
    difficulty: easy
    max_steps: 4
    passing_score: 0.6

  - name: task_find_source
    description: Find the exact outdated document responsible for the hallucinated answer
    difficulty: medium
    max_steps: 6
    passing_score: 0.7

  - name: task_full_pipeline
    description: Full self-healing pipeline — answer, detect, find source, fix, verify
    difficulty: hard
    max_steps: 10
    passing_score: 0.85

  - name: task_cross_topic_audit
    description: Expert autonomous audit of multiple topics with complete stale-doc cleanup
    difficulty: expert
    max_steps: 15
    passing_score: 0.90

server:
  dockerfile: server/Dockerfile
  port: 7860
  health_endpoint: /health

inference:
  script: inference.py
  timeout_minutes: 20
  max_memory_gb: 8
  max_vcpu: 2
  required_env_vars:
    - HF_TOKEN
